<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬라이드 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F4F6FA;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --accent: #4F46E5;
  --accent-light: #EEF2FF;
  --text-primary: #1E293B;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --sidebar-w: 300px;
  --header-h: 60px;
  --footer-h: 64px;
  --radius: 10px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.logo { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; white-space: nowrap; }
.header-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.slide-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.progress-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.progress-bar-outer { width: 120px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar-inner { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
.progress-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); min-width: 48px; text-align: right; }

.btn-hd {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary);
  font-family: inherit; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
}
.btn-hd:hover { background: var(--bg); color: var(--text-primary); }
.btn-hd.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* ── Layout ── */
.layout { flex: 1; display: flex; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width 0.25s ease; overflow: hidden;
}
.sidebar.hidden { width: 0; }
.sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-search {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: inherit; color: var(--text-primary); outline: none;
  transition: border-color 0.15s; background: var(--bg);
}
.sidebar-search:focus { border-color: var(--accent); }
.sidebar-count { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }
.slide-list { flex: 1; overflow-y: auto; padding: 8px 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.slide-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  cursor: pointer; transition: background 0.1s; border-left: 3px solid transparent;
}
.slide-item:hover { background: var(--bg); }
.slide-item.active { background: var(--accent-light); border-left-color: var(--accent); }
.slide-num {
  font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 28px;
  text-align: center; background: var(--border); padding: 2px 5px; border-radius: 4px; flex-shrink: 0;
}
.slide-item.active .slide-num { background: var(--accent); color: #fff; }
.slide-name { font-size: 13px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.slide-item.active .slide-name { color: var(--accent); font-weight: 600; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.iframe-wrap { flex: 1; position: relative; background: #1e293b; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.slide-iframe { width: 100%; height: 100%; border: none; display: block; }

/* ── Drop Zone ── */
.drop-zone {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; width: 100%; height: 100%; cursor: pointer; transition: background 0.2s;
}
.drop-zone.dragging { background: rgba(79,70,229,0.08); }
.drop-icon { width: 80px; height: 80px; border-radius: 20px; background: rgba(79,70,229,0.12); display: flex; align-items: center; justify-content: center; }
.drop-zone h2 { font-size: 20px; font-weight: 700; color: #fff; }
.drop-zone p { font-size: 13px; color: #94A3B8; text-align: center; line-height: 1.8; }
.drop-btn {
  padding: 10px 28px; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.drop-btn:hover { background: #4338CA; }
.folder-hint {
  font-size: 12px; color: #64748B; background: rgba(255,255,255,0.07);
  padding: 10px 18px; border-radius: 8px; line-height: 2; text-align: left;
  font-family: monospace; letter-spacing: 0.2px;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #1E293B; color: #fff; font-size: 13px; font-weight: 500;
  padding: 10px 20px; border-radius: 8px; z-index: 100;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ── Loading overlay ── */
.loading-overlay {
  position: absolute; inset: 0; background: #1e293b;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 5;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
}
.loading-msg { font-size: 13px; color: rgba(255,255,255,0.5); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Footer ── */
footer {
  height: var(--footer-h); background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 12px; flex-shrink: 0;
}
.nav-btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 20px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  cursor: pointer; font-family: inherit; transition: all 0.15s; user-select: none;
}
.nav-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--text-muted); color: var(--text-primary); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.nav-btn.primary:hover:not(:disabled) { background: #4338CA; border-color: #4338CA; }
.page-indicator {
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  min-width: 80px; text-align: center; padding: 8px 12px;
  background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border);
}
.page-indicator span { color: var(--accent); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">슬라이드 뷰어</div>
  <div class="header-divider"></div>
  <div class="slide-label" id="slideLabel">ZIP 파일을 불러오세요</div>
  <div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>
  <button class="btn-hd" onclick="document.getElementById('zipInput').click()">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
      <path d="M1 7C1 3.686 3.686 1 7 1c1.8 0 3.42.756 4.586 1.97" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M13 7c0 3.314-2.686 6-6 6-1.8 0-3.42-.756-4.586-1.97" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M10.5 1.5L12.2 3.2 10.2 4.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3.5 12.5L1.8 10.8 3.8 9.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    ZIP 바꾸기
  </button>
  <input type="file" id="zipInput" accept=".zip" style="display:none" onchange="handleZip(this.files[0]); this.value='';">
  <button class="btn-hd" id="btnList" onclick="toggleSidebar()">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="2" width="14" height="2" rx="1" fill="currentColor"/>
      <rect x="1" y="7" width="14" height="2" rx="1" fill="currentColor"/>
      <rect x="1" y="12" width="14" height="2" rx="1" fill="currentColor"/>
    </svg>
    목록
  </button>
</header>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <input class="sidebar-search" id="searchInput" placeholder="슬라이드 검색..." oninput="filterSlides(this.value)">
      <div class="sidebar-count" id="sidebarCount">슬라이드 0개</div>
    </div>
    <div class="slide-list" id="slideList"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="iframe-wrap" id="iframeWrap">
      <div class="drop-zone" id="dropZone"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
        onclick="document.getElementById('zipInput').click()">
        <div class="drop-icon">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
            <rect x="4" y="3" width="22" height="28" rx="3" fill="#4F46E5" opacity="0.12" stroke="#4F46E5" stroke-width="1.4"/>
            <rect x="15" y="3" width="11" height="11" rx="1.5" fill="#4F46E5" opacity="0.2"/>
            <path d="M15 3L26 14" stroke="#4F46E5" stroke-width="1.4"/>
            <rect x="11" y="8"  width="2.5" height="3.5" rx="0.6" fill="#4F46E5"/>
            <rect x="13.5" y="11.5" width="2.5" height="3.5" rx="0.6" fill="#4F46E5" opacity="0.55"/>
            <rect x="11" y="15" width="2.5" height="3.5" rx="0.6" fill="#4F46E5"/>
            <rect x="13.5" y="18.5" width="2.5" height="3.5" rx="0.6" fill="#4F46E5" opacity="0.55"/>
            <circle cx="29" cy="29" r="8" fill="#4F46E5"/>
            <path d="M29 25v8M25.5 29l3.5 3.5 3.5-3.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>ZIP 파일 불러오기</h2>
        <p>폴더를 ZIP으로 압축해서 끌어다 놓거나<br>클릭해서 선택하세요</p>
        <div class="folder-hint">
          📦 HTML 개발물 샘플.zip<br>
          &nbsp;&nbsp;├─ 📁 HTML/<br>
          &nbsp;&nbsp;│&nbsp;&nbsp;&nbsp;├─ S01.html<br>
          &nbsp;&nbsp;│&nbsp;&nbsp;&nbsp;└─ S02.html ...<br>
          &nbsp;&nbsp;└─ 📁 이미지/<br>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└─ *.png / *.jpg ...
        </div>
        <button class="drop-btn" onclick="event.stopPropagation(); document.getElementById('zipInput').click()">ZIP 선택</button>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <button class="nav-btn" id="btnFirst" onclick="goTo(0)" disabled>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M10 2L4 6L10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="2" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    처음
  </button>
  <button class="nav-btn" id="btnPrev" onclick="goTo(current - 1)" disabled>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    이전
  </button>
  <div class="page-indicator"><span id="curPage">0</span> / <span id="totalPage">0</span></div>
  <button class="nav-btn primary" id="btnNext" onclick="goTo(current + 1)" disabled>
    다음
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M4 2L8 6L4 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="nav-btn" id="btnLast" onclick="goTo(slides.length - 1)" disabled>
    마지막
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M2 2L8 6L2 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="10" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    마지막
  </button>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── 상태 ─────────────────────────────────────────────────────
let slides = [];       // { name, htmlText }
let imageMap = {};     // 파일명(소문자) → data URL
let current = -1;
let sidebarOpen = true;
let currentBlobUrl = null;

// ── ZIP 처리 ─────────────────────────────────────────────────
async function handleZip(file) {
  if (!file) return;
  showLoading('ZIP 파일 읽는 중...');

  try {
    const zip = await JSZip.loadAsync(file);

    // 1) 이미지 수집: 모든 경로에서 이미지 확장자인 파일을 파일명 키로 저장
    const IMG_EXT = /\.(png|jpe?g|gif|webp|svg|bmp|ico)$/i;
    imageMap = {};
    const imgEntries = Object.values(zip.files).filter(f => !f.dir && IMG_EXT.test(f.name));

    await Promise.all(imgEntries.map(async entry => {
      try {
        const ab = await entry.async('arraybuffer');
        const mime = guessMime(entry.name);
        const b64 = arrayBufferToBase64(ab);
        const fname = entry.name.split('/').pop().toLowerCase();
        imageMap[fname] = `data:${mime};base64,${b64}`;
      } catch(e) { /* 개별 이미지 오류 무시 */ }
    }));

    // 2) HTML 파일 수집 & 정렬
    const htmlEntries = Object.values(zip.files)
      .filter(f => !f.dir && f.name.toLowerCase().endsWith('.html'))
      .sort((a, b) => {
        const na = a.name.split('/').pop();
        const nb = b.name.split('/').pop();
        return na.localeCompare(nb, undefined, { numeric: true, sensitivity: 'base' });
      });

    if (!htmlEntries.length) {
      hideLoading();
      showToast('ZIP 안에 HTML 파일이 없습니다.');
      return;
    }

    const texts = await Promise.all(htmlEntries.map(e => e.async('text')));
    slides = htmlEntries.map((e, i) => ({
      name: e.name.split('/').pop().replace(/\.html$/i, ''),
      htmlText: texts[i]
    }));

    buildList();
    updateSidebarCount(slides.length);
    hideLoading();
    document.getElementById('dropZone').style.display = 'none';
    goTo(0);

    showToast(`슬라이드 ${slides.length}개 · 이미지 ${Object.keys(imageMap).length}개 로드 완료`);

  } catch (err) {
    hideLoading();
    showToast('오류: ' + err.message);
    console.error(err);
  }
}

// ArrayBuffer → base64 (FileReader 없이 동기 처리)
function arrayBufferToBase64(buffer) {
  let binary = '';
  const bytes = new Uint8Array(buffer);
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

function guessMime(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  return ({
    png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
    gif:'image/gif', webp:'image/webp', svg:'image/svg+xml',
    bmp:'image/bmp', ico:'image/x-icon'
  })[ext] || 'image/png';
}

// ── 이미지 경로 치환 ─────────────────────────────────────────
// src="..." 에서 파일명만 추출해 data URL로 교체
function injectImages(html) {
  return html.replace(/src=(["'])([^"']*)\1/g, (match, q, srcVal) => {
    const fname = srcVal.split('/').pop().split('\\').pop().toLowerCase();
    return imageMap[fname] ? `src=${q}${imageMap[fname]}${q}` : match;
  });
}

// ── 슬라이드 렌더 ────────────────────────────────────────────
function renderSlide() {
  const wrap = document.getElementById('iframeWrap');
  const old = wrap.querySelector('iframe');
  if (old) old.remove();
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }

  const ov = document.createElement('div');
  ov.className = 'loading-overlay';
  ov.innerHTML = '<div class="spinner"></div><div class="loading-msg">렌더링 중...</div>';
  wrap.appendChild(ov);

  const injected = injectImages(slides[current].htmlText);
  const blob = new Blob([injected], { type: 'text/html; charset=utf-8' });
  currentBlobUrl = URL.createObjectURL(blob);

  const iframe = document.createElement('iframe');
  iframe.className = 'slide-iframe';
  iframe.src = currentBlobUrl;
  iframe.onload = () => ov.remove();
  wrap.appendChild(iframe);
}

// ── 목록 ─────────────────────────────────────────────────────
function buildList(filter = '') {
  const list = document.getElementById('slideList');
  list.innerHTML = '';
  let shown = 0;
  slides.forEach((s, i) => {
    if (filter && !s.name.toLowerCase().includes(filter.toLowerCase())) return;
    shown++;
    const item = document.createElement('div');
    item.className = 'slide-item' + (i === current ? ' active' : '');
    item.dataset.idx = i;
    item.innerHTML = `
      <span class="slide-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="slide-name">${highlight(s.name, filter)}</span>`;
    item.addEventListener('click', () => goTo(i));
    list.appendChild(item);
  });
  updateSidebarCount(shown, filter ? slides.length : 0);
}

function highlight(name, q) {
  if (!q) return name;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return name.replace(re, '<mark style="background:#EEF2FF;color:#4F46E5;border-radius:2px;">$1</mark>');
}

function filterSlides(q) { buildList(q); }

function updateSidebarCount(shown, total = 0) {
  document.getElementById('sidebarCount').textContent =
    total && shown !== total ? `${shown}개 / 전체 ${total}개` : `슬라이드 ${shown}개`;
}

// ── 네비게이션 ───────────────────────────────────────────────
function goTo(idx) {
  if (!slides.length) return;
  idx = Math.max(0, Math.min(idx, slides.length - 1));
  if (idx === current) return;
  current = idx;
  renderSlide();
  syncList();
  updateNav();
  updateHeader();
}

function syncList() {
  document.querySelectorAll('.slide-item').forEach(el => {
    const i = Number(el.dataset.idx);
    el.classList.toggle('active', i === current);
    if (i === current) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
}

function updateNav() {
  const n = slides.length;
  ['btnFirst','btnPrev'].forEach(id => document.getElementById(id).disabled = current <= 0);
  ['btnNext','btnLast'].forEach(id => document.getElementById(id).disabled = current >= n - 1);
  document.getElementById('curPage').textContent   = n ? current + 1 : 0;
  document.getElementById('totalPage').textContent = n;
}

function updateHeader() {
  const n = slides.length;
  document.getElementById('slideLabel').textContent = n ? slides[current].name : 'ZIP 파일을 불러오세요';
  const pct = n ? Math.round(((current + 1) / n) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = n ? `${current + 1} / ${n}` : '0 / 0';
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('hidden', !sidebarOpen);
  document.getElementById('btnList').classList.toggle('active', sidebarOpen);
}

// ── UI 헬퍼 ─────────────────────────────────────────────────
function showLoading(msg) {
  const wrap = document.getElementById('iframeWrap');
  let ov = wrap.querySelector('.loading-overlay');
  if (!ov) { ov = document.createElement('div'); ov.className = 'loading-overlay'; wrap.appendChild(ov); }
  ov.innerHTML = `<div class="spinner"></div><div class="loading-msg">${msg}</div>`;
}
function hideLoading() {
  const ov = document.getElementById('iframeWrap').querySelector('.loading-overlay');
  if (ov) ov.remove();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Drag & Drop ─────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('dragging'); }
function onDragLeave()  { document.getElementById('dropZone').classList.remove('dragging'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('dragging');
  const file = Array.from(e.dataTransfer.files).find(f => f.name.toLowerCase().endsWith('.zip'));
  if (file) handleZip(file);
  else showToast('ZIP 파일만 지원합니다.');
}

// ── 키보드 단축키 ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['ArrowRight','ArrowDown'].includes(e.key)) { e.preventDefault(); goTo(current + 1); }
  if (['ArrowLeft', 'ArrowUp'  ].includes(e.key)) { e.preventDefault(); goTo(current - 1); }
  if (e.key === 'Home') { e.preventDefault(); goTo(0); }
  if (e.key === 'End')  { e.preventDefault(); goTo(slides.length - 1); }
});

updateNav();
updateHeader();
</script>
</body>
</html>
